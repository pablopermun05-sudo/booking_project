{% extends "bookings/layout.html" %}

{% block body %}
<div class="d-flex justify-content-center mt-5">
    <div class="card text-bg-light shadow-sm" style="width: 100%; max-width: 500px;">
        <div class="card-header text-center py-3">
            <h2 class="mb-0">Registrarse</h2>
        </div>
        <div class="card-body p-4">
            <form action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <input class="form-control" autofocus type="text" name="username" placeholder="Nombre de usuario">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" name="password" placeholder="Contraseña">
                </div>
                <div class="mb-3">
                    <input class="form-control" type="password" name="confirmation" placeholder="Confirmar contraseña">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button class="login-button" type="submit" value="Register">Iniciar Sesión</button>
                </div>
            </form>
            <p class="text-center mb-0">
                ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí.</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
